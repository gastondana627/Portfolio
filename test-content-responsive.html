<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Portfolio - Responsive Design Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="content/content-styles.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #1A1A1A;
            color: #FFFFFF;
        }
        
        .test-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .test-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(44, 44, 44, 0.5);
            border-radius: 15px;
        }
        
        .test-header h1 {
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #2C2C2C, #808080, #E8E8E8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .viewport-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .viewport-stat {
            padding: 10px 20px;
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 10px;
        }
        
        .test-section {
            margin-bottom: 50px;
            padding: 30px;
            background: rgba(44, 44, 44, 0.3);
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 15px;
        }
        
        .test-section h2 {
            margin-top: 0;
            color: var(--content-chrome-end);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }
        
        .test-item {
            padding: 20px;
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid rgba(128, 128, 128, 0.2);
            border-radius: 10px;
        }
        
        .test-item h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }
        
        .test-result {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .test-result.pass {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #81C784;
        }
        
        .test-result.fail {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #E57373;
        }
        
        .test-result.warning {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.5);
            color: #FFB74D;
        }
        
        .test-controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .test-btn {
            padding: 12px 24px;
            background: var(--content-chrome-gradient);
            border: 1px solid rgba(128, 128, 128, 0.3);
            border-radius: 10px;
            color: #FFFFFF;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(128, 128, 128, 0.3);
        }
        
        .breakpoint-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(44, 44, 44, 0.95);
            border: 2px solid var(--content-chrome-mid);
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            z-index: 10000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        
        @media (max-width: 768px) {
            .breakpoint-indicator {
                bottom: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="content-portfolio">
    <div class="test-container">
        <div class="test-header">
            <h1><i class="fas fa-mobile-alt"></i> Content Portfolio Responsive Design Test</h1>
            <p>Testing responsive behavior across different screen sizes and devices</p>
            
            <div class="viewport-info">
                <div class="viewport-stat">
                    <strong>Width:</strong> <span id="viewport-width">-</span>px
                </div>
                <div class="viewport-stat">
                    <strong>Height:</strong> <span id="viewport-height">-</span>px
                </div>
                <div class="viewport-stat">
                    <strong>Device:</strong> <span id="device-type">-</span>
                </div>
                <div class="viewport-stat">
                    <strong>Orientation:</strong> <span id="orientation">-</span>
                </div>
            </div>
            
            <div class="test-controls">
                <button class="test-btn" onclick="runAllTests()">
                    <i class="fas fa-play"></i> Run All Tests
                </button>
                <button class="test-btn" onclick="testBreakpoints()">
                    <i class="fas fa-ruler"></i> Test Breakpoints
                </button>
                <button class="test-btn" onclick="testTouchTargets()">
                    <i class="fas fa-hand-pointer"></i> Test Touch Targets
                </button>
                <button class="test-btn" onclick="testModals()">
                    <i class="fas fa-window-maximize"></i> Test Modals
                </button>
            </div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-ruler-horizontal"></i> Breakpoint Tests</h2>
            <div class="test-grid" id="breakpoint-tests"></div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-hand-pointer"></i> Touch Target Tests</h2>
            <div class="test-grid" id="touch-target-tests"></div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-th"></i> Grid Layout Tests</h2>
            <div class="test-grid" id="grid-layout-tests"></div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-window-maximize"></i> Modal Tests</h2>
            <div class="test-grid" id="modal-tests"></div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-font"></i> Typography Tests</h2>
            <div class="test-grid" id="typography-tests"></div>
        </div>
        
        <div class="test-section">
            <h2><i class="fas fa-images"></i> Image Tests</h2>
            <div class="test-grid" id="image-tests"></div>
        </div>
    </div>
    
    <div class="breakpoint-indicator" id="breakpoint-indicator">
        Desktop
    </div>
    
    <script>
        // Update viewport info
        function updateViewportInfo() {
            document.getElementById('viewport-width').textContent = window.innerWidth;
            document.getElementById('viewport-height').textContent = window.innerHeight;
            document.getElementById('device-type').textContent = getDeviceType();
            document.getElementById('orientation').textContent = window.innerWidth > window.innerHeight ? 'Landscape' : 'Portrait';
            updateBreakpointIndicator();
        }
        
        function getDeviceType() {
            const width = window.innerWidth;
            if (width <= 480) return 'Small Mobile';
            if (width <= 768) return 'Mobile';
            if (width <= 1024) return 'Tablet';
            if (width <= 1440) return 'Desktop';
            return 'Large Desktop';
        }
        
        function updateBreakpointIndicator() {
            const indicator = document.getElementById('breakpoint-indicator');
            const width = window.innerWidth;
            
            if (width <= 480) {
                indicator.textContent = 'Small Mobile (≤480px)';
                indicator.style.borderColor = '#E57373';
            } else if (width <= 768) {
                indicator.textContent = 'Mobile (≤768px)';
                indicator.style.borderColor = '#FFB74D';
            } else if (width <= 1024) {
                indicator.textContent = 'Tablet (769-1024px)';
                indicator.style.borderColor = '#81C784';
            } else if (width <= 1440) {
                indicator.textContent = 'Desktop (1025-1440px)';
                indicator.style.borderColor = '#64B5F6';
            } else {
                indicator.textContent = 'Large Desktop (>1440px)';
                indicator.style.borderColor = '#BA68C8';
            }
        }
        
        // Test breakpoints
        function testBreakpoints() {
            const container = document.getElementById('breakpoint-tests');
            container.innerHTML = '';
            
            const tests = [
                {
                    name: 'Mobile Breakpoint (≤768px)',
                    test: () => window.innerWidth <= 768,
                    expected: 'Should apply mobile styles'
                },
                {
                    name: 'Tablet Breakpoint (769-1024px)',
                    test: () => window.innerWidth > 768 && window.innerWidth <= 1024,
                    expected: 'Should apply tablet styles'
                },
                {
                    name: 'Desktop Breakpoint (>1024px)',
                    test: () => window.innerWidth > 1024,
                    expected: 'Should apply desktop styles'
                },
                {
                    name: 'Small Mobile Breakpoint (≤480px)',
                    test: () => window.innerWidth <= 480,
                    expected: 'Should apply small mobile styles'
                }
            ];
            
            tests.forEach(test => {
                const result = test.test();
                const item = createTestItem(test.name, test.expected, result ? 'pass' : 'warning');
                container.appendChild(item);
            });
        }
        
        // Test touch targets
        function testTouchTargets() {
            const container = document.getElementById('touch-target-tests');
            container.innerHTML = '';
            
            const buttons = document.querySelectorAll('button, .btn, .btn-view-segment, .btn-view-carousel, .btn-view-event');
            let passCount = 0;
            let failCount = 0;
            
            buttons.forEach((button, index) => {
                const rect = button.getBoundingClientRect();
                const minSize = 44; // Minimum touch target size
                const passes = rect.width >= minSize && rect.height >= minSize;
                
                if (passes) passCount++;
                else failCount++;
            });
            
            const item = createTestItem(
                `Touch Target Size Test (${buttons.length} elements)`,
                `All interactive elements should be at least 44x44px`,
                failCount === 0 ? 'pass' : 'fail',
                `Passed: ${passCount}, Failed: ${failCount}`
            );
            container.appendChild(item);
        }
        
        // Test grid layouts
        function testGridLayouts() {
            const container = document.getElementById('grid-layout-tests');
            container.innerHTML = '';
            
            const grids = [
                { selector: '.segment-grid', name: 'Segment Themes Grid' },
                { selector: '.video-gallery-grid', name: 'Video Gallery Grid' },
                { selector: '.carousel-posts-grid', name: 'Carousel Posts Grid' },
                { selector: '.events-grid', name: 'Events Grid' },
                { selector: '.social-links-grid', name: 'Social Links Grid' }
            ];
            
            grids.forEach(grid => {
                const element = document.querySelector(grid.selector);
                if (element) {
                    const computedStyle = window.getComputedStyle(element);
                    const gridColumns = computedStyle.gridTemplateColumns;
                    const columnCount = gridColumns.split(' ').length;
                    
                    const item = createTestItem(
                        grid.name,
                        `Grid should adapt to screen size`,
                        'pass',
                        `Current columns: ${columnCount}`
                    );
                    container.appendChild(item);
                } else {
                    const item = createTestItem(
                        grid.name,
                        `Element should exist`,
                        'warning',
                        `Element not found in current view`
                    );
                    container.appendChild(item);
                }
            });
        }
        
        // Test modals
        function testModals() {
            const container = document.getElementById('modal-tests');
            container.innerHTML = '';
            
            const modals = [
                { selector: '.video-gallery-modal', name: 'Video Gallery Modal' },
                { selector: '.carousel-viewer-modal', name: 'Carousel Viewer Modal' },
                { selector: '.image-gallery-modal', name: 'Image Gallery Modal' }
            ];
            
            modals.forEach(modal => {
                const element = document.querySelector(modal.selector);
                if (element) {
                    const modalContent = element.querySelector('.modal-content, .carousel-viewer-container, .image-gallery-container');
                    if (modalContent) {
                        const rect = modalContent.getBoundingClientRect();
                        const fitsScreen = rect.width <= window.innerWidth && rect.height <= window.innerHeight;
                        
                        const item = createTestItem(
                            modal.name,
                            `Modal should fit within viewport`,
                            fitsScreen ? 'pass' : 'fail',
                            `Size: ${Math.round(rect.width)}x${Math.round(rect.height)}px`
                        );
                        container.appendChild(item);
                    }
                } else {
                    const item = createTestItem(
                        modal.name,
                        `Modal element should exist`,
                        'warning',
                        `Element not found`
                    );
                    container.appendChild(item);
                }
            });
        }
        
        // Test typography
        function testTypography() {
            const container = document.getElementById('typography-tests');
            container.innerHTML = '';
            
            const elements = [
                { selector: '.section-title', name: 'Section Titles', minSize: 24 },
                { selector: '.segment-name', name: 'Segment Names', minSize: 18 },
                { selector: '.video-title', name: 'Video Titles', minSize: 16 },
                { selector: 'p', name: 'Paragraph Text', minSize: 14 }
            ];
            
            elements.forEach(el => {
                const element = document.querySelector(el.selector);
                if (element) {
                    const fontSize = parseFloat(window.getComputedStyle(element).fontSize);
                    const passes = fontSize >= el.minSize;
                    
                    const item = createTestItem(
                        el.name,
                        `Font size should be at least ${el.minSize}px`,
                        passes ? 'pass' : 'fail',
                        `Current size: ${Math.round(fontSize)}px`
                    );
                    container.appendChild(item);
                } else {
                    const item = createTestItem(
                        el.name,
                        `Element should exist`,
                        'warning',
                        `Element not found in current view`
                    );
                    container.appendChild(item);
                }
            });
        }
        
        // Test images
        function testImages() {
            const container = document.getElementById('image-tests');
            container.innerHTML = '';
            
            const images = document.querySelectorAll('img');
            let lazyLoadCount = 0;
            let responsiveCount = 0;
            
            images.forEach(img => {
                if (img.hasAttribute('loading') && img.getAttribute('loading') === 'lazy') {
                    lazyLoadCount++;
                }
                if (img.hasAttribute('srcset') || img.style.maxWidth === '100%') {
                    responsiveCount++;
                }
            });
            
            const lazyItem = createTestItem(
                'Lazy Loading',
                `Images should use lazy loading`,
                lazyLoadCount > 0 ? 'pass' : 'warning',
                `${lazyLoadCount} of ${images.length} images use lazy loading`
            );
            container.appendChild(lazyItem);
            
            const responsiveItem = createTestItem(
                'Responsive Images',
                `Images should be responsive`,
                responsiveCount > 0 ? 'pass' : 'warning',
                `${responsiveCount} of ${images.length} images are responsive`
            );
            container.appendChild(responsiveItem);
        }
        
        // Create test item element
        function createTestItem(name, expected, status, details = '') {
            const item = document.createElement('div');
            item.className = 'test-item';
            item.innerHTML = `
                <h3>${name}</h3>
                <p style="color: rgba(255, 255, 255, 0.7); margin: 5px 0;">${expected}</p>
                ${details ? `<p style="color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin: 5px 0;">${details}</p>` : ''}
                <span class="test-result ${status}">
                    <i class="fas fa-${status === 'pass' ? 'check-circle' : status === 'fail' ? 'times-circle' : 'exclamation-triangle'}"></i>
                    ${status.toUpperCase()}
                </span>
            `;
            return item;
        }
        
        // Run all tests
        function runAllTests() {
            testBreakpoints();
            testTouchTargets();
            testGridLayouts();
            testModals();
            testTypography();
            testImages();
        }
        
        // Initialize
        updateViewportInfo();
        runAllTests();
        
        // Update on resize
        window.addEventListener('resize', () => {
            updateViewportInfo();
            runAllTests();
        });
        
        // Update on orientation change
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                updateViewportInfo();
                runAllTests();
            }, 100);
        });
        
        console.log('Responsive design test suite loaded');
    </script>
</body>
</html>
