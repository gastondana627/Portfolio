<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Optimizations Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            color: #4ECDC4;
        }
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #404040;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .test-result.pass {
            background: #2d5f2e;
            border: 1px solid #4caf50;
        }
        .test-result.fail {
            background: #5f2d2d;
            border: 1px solid #f44336;
        }
        .test-result.info {
            background: #2d3f5f;
            border: 1px solid #2196f3;
        }
        button {
            background: linear-gradient(135deg, #2C2C2C, #808080);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: linear-gradient(135deg, #808080, #C0C0C0);
        }
        .image-test {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #404040, #606060);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }
        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .metrics-table th,
        .metrics-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #404040;
        }
        .metrics-table th {
            background: #2a2a2a;
            color: #4ECDC4;
        }
    </style>
</head>
<body>
    <h1>🚀 Performance Optimizations Test Suite</h1>
    
    <div class="test-section">
        <h2>1. Lazy Loading Test</h2>
        <div id="lazy-loading-results"></div>
        <button onclick="testLazyLoading()">Run Lazy Loading Test</button>
        
        <div class="image-test">
            <div>
                <h4>Standard Image</h4>
                <div class="image-placeholder">Standard Load</div>
            </div>
            <div>
                <h4>Lazy Loaded Image</h4>
                <img data-src="https://via.placeholder.com/400x300/4ECDC4/ffffff?text=Lazy+Loaded" 
                     alt="Lazy loaded test" 
                     loading="lazy">
            </div>
            <div>
                <h4>Below Fold Image</h4>
                <img data-src="https://via.placeholder.com/400x300/FF6B6B/ffffff?text=Below+Fold" 
                     alt="Below fold test" 
                     loading="lazy">
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2>2. Image Optimization Test</h2>
        <div id="image-optimization-results"></div>
        <button onclick="testImageOptimization()">Run Image Optimization Test</button>
    </div>

    <div class="test-section">
        <h2>3. Code Splitting Test</h2>
        <div id="code-splitting-results"></div>
        <button onclick="testCodeSplitting()">Run Code Splitting Test</button>
    </div>

    <div class="test-section">
        <h2>4. Caching Strategy Test</h2>
        <div id="caching-results"></div>
        <button onclick="testCaching()">Run Caching Test</button>
        <button onclick="clearCache()">Clear Cache</button>
    </div>

    <div class="test-section">
        <h2>5. Performance Metrics</h2>
        <div id="performance-metrics"></div>
        <button onclick="showPerformanceMetrics()">Show Performance Metrics</button>
    </div>

    <div class="test-section">
        <h2>6. Browser Support</h2>
        <div id="browser-support"></div>
        <button onclick="checkBrowserSupport()">Check Browser Support</button>
    </div>

    <!-- Load optimization scripts -->
    <script src="lazy-loading.js"></script>
    <script src="image-optimization.js"></script>
    <script src="code-splitting.js"></script>
    <script src="caching-strategy.js"></script>
    <script src="performance-monitor.js"></script>

    <script>
        // Test 1: Lazy Loading
        function testLazyLoading() {
            const results = document.getElementById('lazy-loading-results');
            results.innerHTML = '';

            // Check if LazyLoader is available
            if (typeof LazyLoader !== 'undefined') {
                addResult(results, 'pass', '✓ LazyLoader module loaded successfully');
            } else {
                addResult(results, 'fail', '✗ LazyLoader module not found');
                return;
            }

            // Check Intersection Observer support
            if ('IntersectionObserver' in window) {
                addResult(results, 'pass', '✓ Intersection Observer supported');
            } else {
                addResult(results, 'info', 'ℹ Intersection Observer not supported (fallback active)');
            }

            // Check lazy loaded images
            const lazyImages = document.querySelectorAll('img[data-src]');
            addResult(results, 'info', `ℹ Found ${lazyImages.length} lazy-loadable images`);

            // Check skeleton loader styles
            const skeletonStyles = document.getElementById('skeleton-styles');
            if (skeletonStyles) {
                addResult(results, 'pass', '✓ Skeleton loader styles injected');
            } else {
                addResult(results, 'fail', '✗ Skeleton loader styles not found');
            }
        }

        // Test 2: Image Optimization
        async function testImageOptimization() {
            const results = document.getElementById('image-optimization-results');
            results.innerHTML = '';

            // Check if ImageOptimizer is available
            if (typeof ImageOptimizer !== 'undefined') {
                addResult(results, 'pass', '✓ ImageOptimizer module loaded successfully');
            } else {
                addResult(results, 'fail', '✗ ImageOptimizer module not found');
                return;
            }

            // Check WebP support
            const webpSupported = await ImageOptimizer.checkWebPSupport();
            if (webpSupported) {
                addResult(results, 'pass', '✓ WebP format supported');
            } else {
                addResult(results, 'info', 'ℹ WebP not supported (fallback to JPEG/PNG)');
            }

            // Check body class
            if (document.body.classList.contains('webp-supported') || 
                document.body.classList.contains('webp-not-supported')) {
                addResult(results, 'pass', '✓ WebP detection class added to body');
            } else {
                addResult(results, 'fail', '✗ WebP detection class not added');
            }

            // Check optimized images
            const optimizedImages = document.querySelectorAll('img[data-optimized]');
            addResult(results, 'info', `ℹ ${optimizedImages.length} images optimized`);
        }

        // Test 3: Code Splitting
        function testCodeSplitting() {
            const results = document.getElementById('code-splitting-results');
            results.innerHTML = '';

            // Check if CodeSplitter is available
            if (typeof CodeSplitter !== 'undefined') {
                addResult(results, 'pass', '✓ CodeSplitter module loaded successfully');
            } else {
                addResult(results, 'fail', '✗ CodeSplitter module not found');
                return;
            }

            // Check deferred scripts
            const deferredScripts = document.querySelectorAll('script[defer]');
            addResult(results, 'info', `ℹ ${deferredScripts.length} scripts deferred`);

            // Check preconnect links
            const preconnectLinks = document.querySelectorAll('link[rel="preconnect"]');
            addResult(results, 'info', `ℹ ${preconnectLinks.length} preconnect hints added`);

            // Test dynamic script loading
            addResult(results, 'pass', '✓ Dynamic script loading available');
        }

        // Test 4: Caching Strategy
        function testCaching() {
            const results = document.getElementById('caching-results');
            results.innerHTML = '';

            // Check if CachingStrategy is available
            if (typeof CachingStrategy !== 'undefined') {
                addResult(results, 'pass', '✓ CachingStrategy module loaded successfully');
            } else {
                addResult(results, 'fail', '✗ CachingStrategy module not found');
                return;
            }

            // Test sessionStorage
            try {
                CachingStrategy.CacheManager.set('test_key', 'test_value');
                const value = CachingStrategy.CacheManager.get('test_key');
                if (value === 'test_value') {
                    addResult(results, 'pass', '✓ SessionStorage caching working');
                } else {
                    addResult(results, 'fail', '✗ SessionStorage caching failed');
                }
                CachingStrategy.CacheManager.remove('test_key');
            } catch (e) {
                addResult(results, 'fail', '✗ SessionStorage not available');
            }

            // Check cache size
            const cacheSize = CachingStrategy.CacheManager.getSize();
            addResult(results, 'info', `ℹ Current cache size: ${(cacheSize / 1024).toFixed(2)} KB`);

            // Check Service Worker support
            if ('serviceWorker' in navigator) {
                addResult(results, 'pass', '✓ Service Worker supported');
            } else {
                addResult(results, 'info', 'ℹ Service Worker not supported');
            }
        }

        // Clear cache
        function clearCache() {
            if (typeof CachingStrategy !== 'undefined') {
                CachingStrategy.CacheManager.clear();
                alert('Cache cleared successfully!');
                testCaching();
            }
        }

        // Test 5: Performance Metrics
        function showPerformanceMetrics() {
            const results = document.getElementById('performance-metrics');
            results.innerHTML = '';

            // Check if PerformanceMonitor is available
            if (typeof PerformanceMonitor !== 'undefined') {
                addResult(results, 'pass', '✓ PerformanceMonitor module loaded successfully');
                
                // Get metrics
                const metrics = PerformanceMonitor.getMetrics();
                const score = PerformanceMonitor.calculateScore();

                // Display score
                addResult(results, 'info', `ℹ Performance Score: ${score}/100`);

                // Create metrics table
                const table = document.createElement('table');
                table.className = 'metrics-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Metric</th>
                            <th>Value</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="metrics-body"></tbody>
                `;
                results.appendChild(table);

                const tbody = document.getElementById('metrics-body');

                // Add navigation timing metrics
                if (metrics.navigationTiming && metrics.navigationTiming.pageLoad) {
                    addMetricRow(tbody, 'Page Load Time', 
                        `${metrics.navigationTiming.pageLoad}ms`, 
                        metrics.navigationTiming.pageLoad < 3000 ? 'Good' : 'Needs Improvement');
                    
                    addMetricRow(tbody, 'Time to First Byte', 
                        `${metrics.navigationTiming.ttfb}ms`, 
                        metrics.navigationTiming.ttfb < 600 ? 'Good' : 'Needs Improvement');
                }

                // Add Web Vitals
                if (metrics.webVitals) {
                    if (metrics.webVitals.fcp) {
                        addMetricRow(tbody, 'First Contentful Paint', 
                            `${Math.round(metrics.webVitals.fcp)}ms`, 
                            metrics.webVitals.fcp < 1800 ? 'Good' : 'Needs Improvement');
                    }
                    if (metrics.webVitals.lcp) {
                        addMetricRow(tbody, 'Largest Contentful Paint', 
                            `${Math.round(metrics.webVitals.lcp)}ms`, 
                            metrics.webVitals.lcp < 2500 ? 'Good' : 'Needs Improvement');
                    }
                    if (metrics.webVitals.cls !== undefined) {
                        addMetricRow(tbody, 'Cumulative Layout Shift', 
                            metrics.webVitals.cls.toFixed(3), 
                            metrics.webVitals.cls < 0.1 ? 'Good' : 'Needs Improvement');
                    }
                }

                // Show full report in console
                PerformanceMonitor.reportMetrics();
                addResult(results, 'info', 'ℹ Full performance report logged to console');
            } else {
                addResult(results, 'fail', '✗ PerformanceMonitor module not found');
            }
        }

        // Test 6: Browser Support
        function checkBrowserSupport() {
            const results = document.getElementById('browser-support');
            results.innerHTML = '';

            const features = [
                { name: 'Intersection Observer', check: 'IntersectionObserver' in window },
                { name: 'Service Worker', check: 'serviceWorker' in navigator },
                { name: 'Performance API', check: 'performance' in window },
                { name: 'PerformanceObserver', check: 'PerformanceObserver' in window },
                { name: 'SessionStorage', check: 'sessionStorage' in window },
                { name: 'Fetch API', check: 'fetch' in window },
                { name: 'Promise', check: 'Promise' in window },
                { name: 'requestIdleCallback', check: 'requestIdleCallback' in window }
            ];

            features.forEach(feature => {
                if (feature.check) {
                    addResult(results, 'pass', `✓ ${feature.name} supported`);
                } else {
                    addResult(results, 'info', `ℹ ${feature.name} not supported (fallback available)`);
                }
            });
        }

        // Helper functions
        function addResult(container, type, message) {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            container.appendChild(div);
        }

        function addMetricRow(tbody, name, value, status) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${name}</td>
                <td>${value}</td>
                <td>${status}</td>
            `;
            tbody.appendChild(row);
        }

        // Run initial tests on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                checkBrowserSupport();
            }, 1000);
        });
    </script>
</body>
</html>
