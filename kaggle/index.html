<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaggle - Gaston Dana</title>
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="kaggle-styles.css">
</head>
<body>

    <header>
        <nav>
            <a href="/" class="logo gradient-text">Gaston Dana</a>
            <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Toggle mobile menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="/#about" class="gradient-text">About</a></li>
                <li><a href="/#projects" class="gradient-text">Projects</a></li>
                <li><a href="/kaggle/" class="gradient-text">Kaggle</a></li>
                <li><a href="/content/" class="gradient-text">Content Creation</a></li>
                <li><a href="/#contact" class="gradient-text">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="data-science" class="section">
        <div class="container">
            <div class="kaggle-section-header">
                <h2 class="section-title">Kaggle</h2>
            </div>
            <p class="section-description">Independent benchmarks, notebooks and datasets - ranked Expert on Kaggle.</p>

            <div class="kf-ranks" id="kf-ranks"></div>

            <nav class="kf-chips" id="kf-chips">
                <button class="kf-chip active" data-f="all">All</button>
                <button class="kf-chip" data-f="notebooks">Notebooks</button>
                <button class="kf-chip" data-f="datasets">Datasets</button>
                <button class="kf-chip" data-f="benchmarks">Benchmarks</button>
            </nav>

            <div class="kf-grid" id="kf-grid"></div>

            <div class="kaggle-profile-cta">
                <p>Want to see more of my data science work?</p>
                <a href="https://www.kaggle.com/gastondana" target="_blank" rel="noopener noreferrer" class="button button-primary">
                    <i class="fab fa-kaggle"></i> Visit My Kaggle Profile
                </a>
            </div>
        </div>
    </section>

<script src="kaggle-data.js"></script>
<script>
(function(){
  var D = window.KAGGLE_DATA;
  var grid = document.getElementById('kf-grid');
  if(!D){ if(grid) grid.innerHTML = '<p class="kf-empty">Loading Kaggle data...</p>'; return; }
  var p = D.profile||{}, r = p.rankings||{}, c = p.counts||{};
  var ranks = document.getElementById('kf-ranks');
  function rankCard(label, rk){
    if(!rk) return '';
    return '<div class="kf-rank"><span class="kf-rank-tier">'+rk.tier+'</span><span class="kf-rank-label">'+label+'</span><span class="kf-rank-num">#'+rk.rank+'<small> / '+Number(rk.of).toLocaleString()+'</small></span></div>';
  }
  ranks.innerHTML =
    rankCard('Datasets', r.datasets) +
    rankCard('Notebooks', r.notebooks) +
    '<div class="kf-counts">'+
      '<span><b>'+(c.code||0)+'</b> Notebooks</span>'+
      '<span><b>'+(c.datasets||0)+'</b> Datasets</span>'+
      '<span><b>'+(c.benchmarks||0)+'</b> Benchmarks</span>'+
    '</div>';

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function nbCard(n){
    return '<a class="kf-card" href="'+n.url+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="kf-card-top"><span class="kf-tag">Notebook</span><span class="kf-votes">&uarr; '+n.votes+'</span></div>'+
      '<h3 class="kf-card-title">'+esc(n.title)+'</h3>'+
      '<div class="kf-card-meta">'+(n.score?('Score: '+esc(n.score)+' &middot; '):'')+'Updated '+esc(n.updated)+(n.comments?(' &middot; '+n.comments+' comments'):'')+'</div>'+
    '</a>';
  }
  function dsCard(d){
    return '<a class="kf-card" href="'+d.url+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="kf-card-top"><span class="kf-tag">Dataset'+(d.medal?' &middot; '+d.medal:'')+'</span><span class="kf-votes">&uarr; '+d.votes+'</span></div>'+
      '<h3 class="kf-card-title">'+esc(d.title)+'</h3>'+
      '<div class="kf-card-meta">Usability '+d.usability+' &middot; '+esc(d.size)+' &middot; Updated '+esc(d.updated)+'</div>'+
    '</a>';
  }
  function bmFeature(b){
    return '<a class="kf-card" href="'+b.url+'" target="_blank" rel="noopener noreferrer">'+
      '<div class="kf-card-top"><span class="kf-tag kf-tag-bench">Benchmark &middot; '+esc(b.version)+'</span><span class="kf-votes">&uarr; '+b.votes+'</span></div>'+
      '<h3 class="kf-card-title">'+esc(b.title)+'</h3>'+
      (b.description?('<p class="kf-card-desc">'+esc(b.description)+'</p>'):'')+
      '<div class="kf-card-meta">Updated '+esc(b.updated)+'</div>'+
    '</a>';
  }
  function bmTask(b){
    return '<a class="kf-task" href="'+b.url+'" target="_blank" rel="noopener noreferrer">'+
      '<span class="kf-task-v">&uarr; '+b.votes+'</span>'+
      '<span class="kf-task-t">'+esc(b.title)+'</span>'+
      '<span class="kf-task-meta">'+esc(b.version)+' &middot; '+esc(b.updated)+'</span>'+
    '</a>';
  }
  var active='all';
  function render(){
    var html='';
    if(active==='notebooks'){
      (D.notebooks||[]).forEach(function(n){ html+=nbCard(n); });
    } else if(active==='datasets'){
      (D.datasets||[]).forEach(function(d){ html+=dsCard(d); });
    } else if(active==='benchmarks'){
      var cbs=(D.benchmarks||[]).filter(function(b){return b.type==='Community Benchmark';});
      var tasks=(D.benchmarks||[]).filter(function(b){return b.type!=='Community Benchmark';});
      if(cbs.length){ html+='<div class="kf-bench-featured">'; cbs.forEach(function(b){ html+=bmFeature(b); }); html+='</div>'; }
      if(tasks.length){
        html+='<h3 class="kf-subhead">Benchmark Tasks ('+tasks.length+')</h3><div class="kf-tasks">';
        tasks.forEach(function(b){ html+=bmTask(b); });
        html+='</div>';
      }
    } else {
      (D.notebooks||[]).slice(0,6).forEach(function(n){ html+=nbCard(n); });
      (D.datasets||[]).slice(0,6).forEach(function(d){ html+=dsCard(d); });
      (D.benchmarks||[]).filter(function(b){return b.type==='Community Benchmark';}).forEach(function(b){ html+=bmFeature(b); });
    }
    grid.innerHTML = html || '<p class="kf-empty">No items.</p>';
  }
  render();
  document.getElementById('kf-chips').addEventListener('click', function(e){
    var b=e.target.closest('.kf-chip'); if(!b) return;
    var all=document.querySelectorAll('.kf-chip');
    for(var i=0;i<all.length;i++) all[i].classList.remove('active');
    b.classList.add('active');
    active=b.getAttribute('data-f');
    render();
  });
  // mobile menu toggle (site's script.js is not loaded on this page)
  var mb=document.getElementById('mobile-menu-button'); var nl=document.querySelector('.nav-links');
  if(mb&&nl){ mb.addEventListener('click', function(){ nl.classList.toggle('active'); }); }
})();
</script>
</body>
</html>
